services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    volumes:
      - ./shared:/app/shared
    depends_on:
      - db
    

  scraper:
    build: ./scraper
    env_file:
      - ./.env
    volumes:
      - ./shared:/app/shared
    depends_on:
      - db

  cleaning:
    build: ./cleaning
    env_file:
      - ./.env
    volumes:
      - ./shared:/app/shared
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: saas_monitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: